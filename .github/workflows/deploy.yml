name: Deploy to VPS

# Auto-deploys the static portfolio to the VPS.
# Every push to `main` rsyncs the site to the server over SSH.
# Required repo secrets are documented in DEPLOYMENT.md.

on:
  push:
    branches: [main]
  workflow_dispatch:

# Never run two deploys at once.
concurrency:
  group: deploy-production
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check deploy secrets
        run: |
          missing=""
          if [ -z "${{ secrets.VPS_HOST }}" ];        then missing="$missing VPS_HOST"; fi
          if [ -z "${{ secrets.VPS_USER }}" ];        then missing="$missing VPS_USER"; fi
          if [ -z "${{ secrets.VPS_SSH_KEY }}" ];     then missing="$missing VPS_SSH_KEY"; fi
          if [ -z "${{ secrets.VPS_DEPLOY_PATH }}" ]; then missing="$missing VPS_DEPLOY_PATH"; fi
          if [ -n "$missing" ]; then
            echo "::error::Missing repo secrets:$missing — see DEPLOYMENT.md"
            exit 1
          fi

      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          PORT="${{ secrets.VPS_SSH_PORT }}"
          ssh-keyscan -p "${PORT:-22}" "${{ secrets.VPS_HOST }}" >> ~/.ssh/known_hosts 2>/dev/null

      - name: Deploy with rsync
        run: |
          PORT="${{ secrets.VPS_SSH_PORT }}"
          rsync -avz --delete \
            --exclude='.git/' \
            --exclude='.github/' \
            --exclude='deploy/' \
            --exclude='DEPLOYMENT.md' \
            --exclude='README.md' \
            --exclude='.gitignore' \
            --exclude='.gitattributes' \
            -e "ssh -i ~/.ssh/deploy_key -p ${PORT:-22} -o StrictHostKeyChecking=yes" \
            ./ "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:${{ secrets.VPS_DEPLOY_PATH }}/"

      - name: Summary
        run: echo "Deployed ${GITHUB_SHA::7} to ${{ secrets.VPS_DEPLOY_PATH }} on the VPS."
